    <linearGradient id="tabGradient" x1="578" y1="372" x2="718" y2="372" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF7F2"/>
      <stop offset="1" stop-color="#F7FBF9"/>
    </linearGradient>
