services:
  postgres:
    image: postgres:17-alpine
    container_name: tcc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tcc
      POSTGRES_USER: tcc
      POSTGRES_PASSWORD: tcc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcc -d tcc"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
